version: '3.8'

networks:
  arya-banking-net:
    external: true

services:
  vault:
    image: hashicorp/vault:1.21
    container_name: vault
    ports:
      - "8091:8200"
    volumes:
      - ./vault/data:/vault/data
      - ./vault/config:/vault/config
    command: vault server -config=vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    networks:
      - arya-banking-net
